name: CI-Forge
on:
  pull_request:
    branches:
      - development
jobs:
  forge-test:
    name: Forge Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
      - name: Forge Test
        run: forge test -vvvvvv
